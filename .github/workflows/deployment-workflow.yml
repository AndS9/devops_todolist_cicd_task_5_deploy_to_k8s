name: helm-upgrade
run-name: ${{ github.actor }} - ${{ github.ref_name }}

on: 
  workflow_call: 
    inputs:
      environment:
        required: true
        description: "Environment to deploy to"
        type: string
      version:
        required: true
        type: string
      helm-values-path:
        type: string
        default: "./todoapp/values.yaml"
      helm-release-name:
        type: string
        default: "todoapp"

env: 
  DockerImageName: todoapp

jobs: 

  deploy-helm:
    name: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-artifacts
        path: .
        
    - uses: actions/download-artifact@v4
      with:
        name: helm-package
        path: .
    
    - uses: actions/download-artifact@v4
      with:
        name: helm-artifacts
        path: .
    
    - name: Install kind cluster
      uses: helm/kind-action@v1.14.0
      with:
        config: cluster.yml

    - name: Set Up Helm
      uses: azure/setup-helm@v4.2.0
      
    - name: Set Up Kubectl
      uses: azure/setup-kubectl@v4

    - name: helm --dry-run
      run: |
        helm install --dry-run --debug ${{ inputs.helm-release-name }} ./todoapp-*.tgz -f ${{inputs.helm-values-path}}

    - name: Deploy Helm to ${{ inputs.environment }}
      run: |
        helm upgrade --install --atomic --wait --timeout 600s --debug ${{ inputs.helm-release-name }} ./todoapp-*.tgz \
          -f ${{ inputs.helm-values-path }} \
          --set mysql.secrets.MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
          --set mysql.secrets.MYSQL_USER=${{ secrets.MYSQL_USER }} \
          --set mysql.secrets.MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
          --set todoapp.secrets.SECRET_KEY=${{ secrets.TODOAPP_SECRET_KEY }} \
          --set todoapp.secrets.DB_NAME=${{ secrets.DB_NAME }} \
          --set todoapp.secrets.DB_USER=${{ secrets.DB_USER }} \
          --set todoapp.secrets.DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
          --set todoapp.secrets.DB_HOST=${{ secrets.DB_HOST }} \
          --set todoapp.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }} \
          --set todoapp.image.tag=${{ github.sha }}